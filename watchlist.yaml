# Companies to always monitor, regardless of the general job boards.
# job_board_url is optional — add it if you know the direct careers page URL.
# Leave job_board_url blank and the scraper will search LinkedIn Israel for that company name.

companies:
  - name: Mobileye
    job_board_url: https://careers.mobileye.com/jobs

  - name: Apple
    job_board_url: https://jobs.apple.com/en-us/search?location=israel-ISR

  - name: Quantum Machines
    job_board_url: https://qm.teamme.link
  
  - name: classiq
    job_board_url: https://www.classiq.io/careers-page

  - name: vayyar
    job_board_url: https://vayyar.com/?uael-modal-action=ae58399

  - name: qualcomm
    job_board_url: https://careers.qualcomm.com/careers?start=0&location=Israel&pid=446717229429&sort_by=distance&filter_include_remote=0

  - name: Google
